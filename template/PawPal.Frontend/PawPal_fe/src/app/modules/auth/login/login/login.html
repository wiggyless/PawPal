        <span style="font-weight: bold;">Enter your credentials to enter the animal adoption world!</span><br>
        <a class="forgot-password" routerLink="/auth/register">Don't have an account? Sign up today!</a>
    </div>
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-inputs" >
        <div class="form-group">
            <label for="email">E-mail</label>
            <mat-form-field class="options">
                <input matInput type="text" id="email" formControlName="email" required placeholder="e.g. user123@gmail.com">
                <mat-error *ngIf="form.get('email')?.hasError('required')">Please enter your e-mail!</mat-error>
                <mat-error *ngIf="form.get('email')?.hasError('email')">Enter a valid e-mail format!</mat-error>
            </mat-form-field>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrapper">
                <mat-form-field class="options">
                    <input matInput [type]="showPassword ? 'text' : 'password'" id="password" formControlName="password" required placeholder="Enter your password">
                      <button matSuffix mat-icon-button type="button" (click)="togglePassword()" class="eye-btn">
             <mat-icon>{{ showPassword ? 'visibility' : 'visibility_off' }}</mat-icon>
            </button>
                    <mat-error *ngIf="form.get('password')?.hasError('required')">Please enter a password!</mat-error>
                </mat-form-field>
                </div>
        </div>
        <button class="secondarybtn" routerLink="">Go back</button>
        <button type="submit" class="primarybtn"[disabled]="form.invalid">Login</button>
    </form>
    
</div>
