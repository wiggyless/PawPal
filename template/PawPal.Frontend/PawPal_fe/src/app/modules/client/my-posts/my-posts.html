<app-navbar [roleId]="currentUser.roleid()"></app-navbar>
<div class="client-layout-container">
  <div class="client-layout">
    <app-user-profile-side-navbar class="client-side-navbar"></app-user-profile-side-navbar>
    <div class="client-content-posts-container">
      <h1>PUBLIC POSTS:</h1>
      <div class="client-content-posts">
        @for( post of animalPostList.items;track post) {
        <div class="post">
          <div class="post-image">
            <img [src]="post.firstImage == '' ? '' : envLink.apiUrl + post.firstImage" />
          </div>
          <div class="post-info">
            <p class="post-info-name">{{ post.animalName }}</p>
            <p class="post-info-views">1,234 views</p>
          </div>
        </div>
        }
      </div>
    </div>
  </div>
</div>
