<mat-nav-list class="user-profile-option-list">
  @for(items of matListItems|keyvalue: keepOrder;track items.key) {
  <mat-list-item
    class="user-profile-option"
    (click)="onSelect(items.key)"
    [class.user-profile-option-bold]="selectedItem == items.key"
    [routerLink]="items.value"
    [state]="{
      item: items.key
    }"
    >{{ items.key.replace('_', ' ') }}
  </mat-list-item>
  }
</mat-nav-list>
<div class="user-profile-option-footer">
  <div class="delete-profile-footer">
   
  </div>
  <div class="logout-profile-footer">
    <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 40 40" fill="none">
      <path
        d="M15 35H8.33333C7.44928 35 6.60143 34.6488 5.97631 34.0237C5.35119 33.3986 5 32.5507 5 31.6667V8.33333C5 7.44928 5.35119 6.60143 5.97631 5.97631C6.60143 5.35119 7.44928 5 8.33333 5H15M26.6667 28.3333L35 20M35 20L26.6667 11.6667M35 20H15"
        stroke="white"
        stroke-width="4"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </svg>
    <a style="text-decoration:none; cursor:pointer; color:white" routerLink="/auth/logout">Logout</a>
  </div>
</div>
