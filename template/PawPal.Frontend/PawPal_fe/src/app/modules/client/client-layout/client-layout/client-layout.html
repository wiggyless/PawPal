<div class="client-layout-container">
  <div class="client-layout">
    <app-navbar [roleId]="currentUser.roleid()"></app-navbar>
    <app-user-profile-side-navbar
      class="client-side-navbar"
      [selItem]="selectedItem"
    ></app-user-profile-side-navbar>
    <div
      [class]="
        url() == '/my-profile' || url() == '/settings' ? 'client-content-center' : 'client-content'
      "
    >
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
