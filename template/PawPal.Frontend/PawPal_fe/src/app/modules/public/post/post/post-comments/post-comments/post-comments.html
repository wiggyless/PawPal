<p class="comments-title">COMMENTS ({{ commentsList.totalItems }})</p>
<div class="comment-textarea">
  <textarea placeholder="Add your comment here..." [(ngModel)]="comment"></textarea>
  <button class="primarybtn" (click)="addNewComment()">UPLOAD COMMENT</button>
</div>

<div class="comments">
  @if (hasLoaded()) {
    @if (commentsList.totalItems === 0) {
      <div class="no-comments-message">
        <p>Be the first one to comment.</p>
      </div>
    } @else {
      <cdk-virtual-scroll-viewport
        [itemSize]="200"
        class="viewport"
        (scrolledIndexChange)="onScrollIndexChange($event)"
      >
        <div
          *cdkVirtualFor="let comment of commentsList.items; trackBy: trackComment"
          class="singl-comment-container"
        >
        <div class="singl-comment-user">
          <div class="singl-comment-user-imgHolder">
            @if (comment.photoURL != '') {
              <img
                [src]="env + comment.photoURL"
                class="comment-img"
                (click)="routeToProfile(comment.userID)"
                style="cursor: pointer"
              />
            } @else {
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="120"
                height="120"
                viewBox="0 0 100 100"
                fill="none"
                (click)="routeToProfile(comment.userID)"
                style="cursor: pointer"
              >
                <rect width="100" height="100" rx="50" fill="#191408" />
                <path
                  fill-rule="evenodd"
                  clip-rule="evenodd"
                  d="M65.0006 40C65.0006 48.2843 58.2849 55 50.0006 55C41.7163 55 35.0006 48.2843 35.0006 40C35.0006 31.7157 41.7163 25 50.0006 25C58.2849 25 65.0006 31.7157 65.0006 40ZM60.0006 40C60.0006 45.5228 55.5235 50 50.0006 50C44.4778 50 40.0006 45.5228 40.0006 40C40.0006 34.4772 44.4778 30 50.0006 30C55.5235 30 60.0006 34.4772 60.0006 40Z"
                  fill="#C7B18C"
                />
                <path
                  d="M50.0006 62.5C33.8147 62.5 20.0238 72.071 14.7705 85.4801C16.0502 86.7509 17.3984 87.9529 18.8088 89.0801C22.7207 76.7692 34.9924 67.5 50.0006 67.5C65.0088 67.5 77.2806 76.7693 81.1924 89.0802C82.6029 87.9529 83.951 86.7509 85.2307 85.4802C79.9775 72.071 66.1866 62.5 50.0006 62.5Z"
                  fill="#C7B18C"
                />
              </svg>
            }
          </div>
          <p class="singl-comment-userName comment-details" id="">{{ comment.username }}</p>
          <p class="comment-details">{{ comment.datePosted | date: 'dd/MM/yyyy' }}</p>
        </div>
        <div class="singl-comment-content">
          <p>{{ comment.content }}</p>
          <button class="report-button" (click)="openReportCommentDialog(comment.commentID)">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="40"
              height="40"
              viewBox="0 0 40 40"
              fill="none"
            >
              <path
                d="M20.0002 28.333C20.4724 28.333 20.8682 28.1733 21.1877 27.8538C21.5071 27.5344 21.6668 27.1386 21.6668 26.6663C21.6668 26.1941 21.5071 25.7983 21.1877 25.4788C20.8682 25.1594 20.4724 24.9997 20.0002 24.9997C19.5279 24.9997 19.1321 25.1594 18.8127 25.4788C18.4932 25.7983 18.3335 26.1941 18.3335 26.6663C18.3335 27.1386 18.4932 27.5344 18.8127 27.8538C19.1321 28.1733 19.5279 28.333 20.0002 28.333ZM18.3335 21.6663H21.6668V11.6663H18.3335V21.6663ZM20.0002 36.6663C17.6946 36.6663 15.5279 36.2288 13.5002 35.3538C11.4724 34.4788 9.7085 33.2913 8.2085 31.7913C6.7085 30.2913 5.521 28.5275 4.646 26.4997C3.771 24.4719 3.3335 22.3052 3.3335 19.9997C3.3335 17.6941 3.771 15.5275 4.646 13.4997C5.521 11.4719 6.7085 9.70801 8.2085 8.20801C9.7085 6.70801 11.4724 5.52051 13.5002 4.64551C15.5279 3.77051 17.6946 3.33301 20.0002 3.33301C22.3057 3.33301 24.4724 3.77051 26.5002 4.64551C28.5279 5.52051 30.2918 6.70801 31.7918 8.20801C33.2918 9.70801 34.4793 11.4719 35.3543 13.4997C36.2293 15.5275 36.6668 17.6941 36.6668 19.9997C36.6668 22.3052 36.2293 24.4719 35.3543 26.4997C34.4793 28.5275 33.2918 30.2913 31.7918 31.7913C30.2918 33.2913 28.5279 34.4788 26.5002 35.3538C24.4724 36.2288 22.3057 36.6663 20.0002 36.6663Z"
                fill="#473619"
              />
            </svg>
          </button>
        </div>
      </div>
      </cdk-virtual-scroll-viewport>
    }
  }
</div>
