<!DOCTYPE html>
<html lang="en">
  <head>
    <title>PawPal</title>
</head>
<body>
  <app-navbar [roleId]="currentUser.roleid()"></app-navbar>
         <div class="header">
            <p> NEED A NEW MEMBER OF YOUR FAMILY?</p>
            <span>Connect with animal lovers across Bosnia and Herzegovina with our 
                services and adopt an animal today!</span>
            <br>
            <div class="options">
              <ng-select class ="custom"
              placeholder="Choose an animal category">
                    @for (cat of animalCategories.items; track cat) {
                      <ng-option [value]="cat.id"> {{cat.categoryName}} </ng-option>
                    }
              </ng-select>
               <ng-select class ="custom"
               placeholder="Choose a city">
                   @for (city of cities.items; track city) {
                      <ng-option [value]="city.id"> {{city.name}} </ng-option>
                    }
              </ng-select>
            </div>
            <div class="search-btn">
 <button class="primarybtn"> SEARCH</button>
            </div>
        </div>
       
</body>

</html>
