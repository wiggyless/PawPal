<h2 mat-dialog-title style="color: var(--card-text-color);">Add News</h2>

<mat-dialog-content>
  <form [formGroup]="form" id="add-news-form" novalidate>
    <label class="photo-label" for="news-photo">Main image</label>
    <input id="news-photo" type="file" accept="image/*" (change)="onPhotoSelected($event)" />

    @if (photoPreview()) {
      <img [src]="photoPreview()" class="photo-preview" alt="Preview" />
    }

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Title</mat-label>
      <input matInput formControlName="title" placeholder="News title" maxlength="200" />
      @if (form.get('title')?.hasError('required') && form.get('title')?.touched) {
        <mat-error>Title is required.</mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Description</mat-label>
      <textarea
        matInput
        formControlName="content"
        placeholder="Write the full news story..."
        style="resize: vertical"
        rows="6"
      ></textarea>
      @if (form.get('content')?.hasError('required') && form.get('content')?.touched) {
        <mat-error>Description is required.</mat-error>
      }
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button class="secondarybtn" (click)="close()">CANCEL</button>
  <button class="primarybtn" [disabled]="form.invalid || !selectedPhoto || isSubmitting()" (click)="submit()">
    @if (isSubmitting()) {
      <mat-spinner diameter="18"></mat-spinner>
    } @else {
      PUBLISH
    }
  </button>
</mat-dialog-actions>
