<app-navbar [roleId]="currentUser.roleid()"></app-navbar>
<div class="content">
  <div class="content-center">
    <div class="user-profile-buttons">
      <button class="primarybtn" (click)="reportProfile()">REPORT PROFILE</button>
    </div>
    <div class="user-profile-details">
      <div class="user-profile-detials-header">
        <div class="user-profile-image">
          @if (userData.photoURL != '') {
            <img [src]="env + userData.photoURL" alt="User image" class="profile-preview" />
          } @else {
            <svg viewBox="0 0 24 24" width="84" height="84">
              <path
                class="userImg"
                d="M12,4A4,4 0 0,1 16,8A4,4 0 0,1 12,12A4,4 0 0,1 8,8A4,4 0 0,1 12,4M12,14C16.42,14 20,15.79 20,18V20H4V18C4,15.79 7.58,14 12,14Z"
              />
            </svg>
          }
        </div>
        <div class="user-profile-detials-header-text">
          <h1 class="user-profile-details-name">
            {{ userData.firstName }} {{ userData.lastName }}
          </h1>
          <p class="user-profile-details-prop">Username: {{ userData.username }}</p>
        </div>
      </div>
      <div class="user-profile-detials-main">
        <form class="user-profile-form" [formGroup]="profileForm">
          <div class="user-profile-form-input-container">
            <div class="form-field-format">
              <label class="input-label">First name</label>
              <mat-form-field>
                <input matInput formControlName="firstName" />
              </mat-form-field>
            </div>
          </div>
          <div class="user-profile-form-input-container">
            <div class="form-field-format">
              <label class="input-label">Last name</label>
              <mat-form-field>
                <input matInput formControlName="lastName" />
              </mat-form-field>
            </div>
          </div>
          <div class="user-profile-form-input-container">
            <div class="form-field-format-date">
              <label class="input-label">Date of birth</label>
              <mat-form-field>
                <input
                  matInput
                  [matDatepicker]="picker"
                  placeholder="dd.MM.yyyy"
                  formControlName="date"
                />
                <mat-datepicker-toggle matIconPrefix [for]="picker"></mat-datepicker-toggle>
                <mat-datepicker #picker></mat-datepicker>
              </mat-form-field>
            </div>
          </div>
          <div class="user-profile-form-input-container">
            <div class="form-field-format">
              <label class="input-label">City</label>
              <mat-form-field>
                <mat-icon matIconPrefix
                  ><svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="25"
                    height="25"
                    viewBox="0 0 30 40"
                    fill="none"
                  >
                    <path
                      d="M13.125 32.0832V17.4998H21.875V32.0832M4.375 13.1248L17.5 2.9165L30.625 13.1248V29.1665C30.625 29.9401 30.3177 30.6819 29.7707 31.2289C29.2237 31.7759 28.4819 32.0832 27.7083 32.0832H7.29167C6.51812 32.0832 5.77625 31.7759 5.22927 31.2289C4.68229 30.6819 4.375 29.9401 4.375 29.1665V13.1248Z"
                      stroke="#958B7E"
                      stroke-width="3.5"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />
                  </svg>
                </mat-icon>
                <input matInput formControlName="city" />
              </mat-form-field>
            </div>
          </div>
          <div
            class="user-profile-form-input-container"
            id="user-profile-form-input-aboutme-container"
          >
            <label for="about-Me-Text" class="input-label">About me</label>
            <textarea
              class="user-profile-form-input"
              id="about-Me-Text"
              type="text"
              formControlName="aboutMe"
            ></textarea>
          </div>
        </form>
      </div>
    </div>
  </div>
  @if (isLoaded()) {
    <div class="posts-wrapper">
      <p class="posts-title">Posts from {{ userData.username }}</p>
      <div class="posts-container">
        @for (post of postList!.items; track post) {
          <div class="post" (click)="routeToPost(post)">
            <div class="post-image">
              <img [src]="post.mainImage == '' ? '' : env + post.mainImage" />
            </div>
            <div class="post-info">
              <p class="post-info-name">{{ post.name }}</p>
            </div>
          </div>
        }
      </div>
      <mat-paginator
        [length]="postList?.totalItems"
        [pageSize]="paging.pageSize"
        [pageSizeOptions]="[4, 8, 16, 32]"
        aria-label="Select page"
        (page)="handlePageEvent($event)"
      >
      </mat-paginator>
    </div>
  }
</div>
